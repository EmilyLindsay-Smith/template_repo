name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Sync workspace
        run: uv sync --locked

      - name: Cache pre-commit
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run pre-commit
        env:
          SKIP: no-commit-to-branch
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Pytest
        run: |
          if find tests -type f -name "test_*.py" | grep -q .; then
            uv run pytest \
              --cov=src \
              --cov-report=term-missing \
              --cov-report=html
          else
            echo "No tests found; skipping."
          fi

  pr-title:
    name: PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys

          title = os.environ["TITLE"]
          pattern = r'^(feat|fix|docs|refactor|test|chore|build|ci|perf|style|revert)(\([^)]+\))?(!)?: .+'

          if not re.match(pattern, title):
              print(f"Invalid PR title: {title!r}")
              print("Use Conventional Commits, for example: feat(parser): handle empty input")
              sys.exit(1)
          PY

  audit:
    name: UV Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.2.0

      - run: uv audit

  typecheck:
    name: pyrefly type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: facebook/pyrefly@main
